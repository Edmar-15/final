{% extends "base.html" %}
{% load static %}

{% block title %}Final| Register{% endblock %}
{% block style %}{% static "css/register.css" %}{% endblock %}

{% block content %}
<div class="content-wrapper">
    <h2>Create Account</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <a href="{% url 'login' %}">Already have an account? Sign in</a>
</div>
{% endblock %}
